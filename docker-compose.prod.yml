services:
  manager-db:
    image: postgres:15-alpine
    container_name: convex-manager-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-convex_manager_secret}
      POSTGRES_DB: ${DB_NAME:-convex_manager_db}
    ports:
      - "5433:5432"
    volumes:
      - manager-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks: 
      - convex-manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-convex_manager_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  manager-backend:
    image: motionninja/convex-manager-backend:latest
    container_name: convex-manager-backend
    environment:
      - NODE_ENV=production
      - PORT=${BACKEND_PORT:-3001}
      - DB_HOST=manager-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-convex_manager_secret}
      - DB_NAME=${DB_NAME:-convex_manager_db}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - APP_URL=${APP_URL:-http://localhost:5173}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-"Convex Manager" <noreply@example.com>}
      - PROJECTS_DIR=/app/projects
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      # Mount the Docker socket so the backend can manage Convex instances
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the projects directory so configurations and data persist
      - ./projects:/app/projects
    depends_on:
      manager-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - convex-manager

  manager-frontend:
    image: motionninja/convex-manager-frontend:latest
    container_name: convex-manager-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.convex-manager.rule=Host(`manager.yourdomain.com`)"
    #   - "traefik.http.routers.convex-manager.entrypoints=websecure"
    #   - "traefik.http.routers.convex-manager.tls.certresolver=myresolver"
    #   - "traefik.http.services.convex-manager.loadbalancer.server.port=80"
    depends_on:
      - manager-backend
    restart: unless-stopped
    networks:
      - convex-manager
      # - traefik_proxy # Add your traefik network here if needed

volumes:
  manager-db-data:

networks:
  convex-manager:
    name: convex-manager
    external: false
